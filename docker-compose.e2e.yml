version: "3.8"

services:
  neo4j:
    image: neo4j:5.16.0
    container_name: auto-code-neo4j-e2e
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - e2e-network

  backend:
    build: ./backend
    container_name: auto-code-backend-e2e
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - ENVIRONMENT=test
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - e2e-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auto-code-frontend-e2e
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - e2e-network

  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    container_name: auto-code-e2e-runner
    depends_on:
      - frontend
      - backend
    environment:
      - FRONTEND_URL=http://frontend:80
      - BACKEND_URL=http://backend:8000
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "
        npm install &&
        npx playwright test --reporter=list
      "
    networks:
      - e2e-network

networks:
  e2e-network:
    driver: bridge
